name: Build Julia Set Animation ICX

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc, icx]
        include:
          - compiler: clang
            build_dir: build\clang_x64
            artifact_name: win32_julia_clang
            artifact_path: build\clang_x64\win32_heap_threadctx_503.exe
          - compiler: msvc
            build_dir: build\msvcl_x64
            artifact_name: win32_julia_msvc
            artifact_path: build\msvcl_x64\win32_heap_threadctx_503.exe
          - compiler: icx
            build_dir: build\icx_x64
            artifact_name: win32_julia_icx
            artifact_path: build\icx_x64\win32_heap_threadctx_503.exe
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenCL via vcpkg
        shell: powershell
        run: |
          $vcpkgRoot = "$env:RUNNER_TEMP\vcpkg"
          if (-not (Test-Path $vcpkgRoot)) {
              git clone -q https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          pushd $vcpkgRoot
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg install opencl --triplet x64-windows --clean-after-build
          popd

          $openclRoot = "$vcpkgRoot\installed\x64-windows"
          if (-not (Test-Path "$openclRoot\include\CL\cl.h")) {
              Write-Error "OpenCL headers not found"
              exit 1
          }
          if (-not (Test-Path "$openclRoot\lib\OpenCL.lib")) {
              Write-Error "OpenCL.lib not found"
              exit 1
          }
          "OPENCL_INCLUDE=$openclRoot\include" | Out-File -Append $env:GITHUB_ENV
          "OPENCL_LIB=$openclRoot\lib"         | Out-File -Append $env:GITHUB_ENV
          Write-Host "OpenCL installed: $openclRoot"

      # ----- Install Intel compiler via winget (with source update) -----
      - name: Install Intel oneAPI DPC++/C++ Compiler
        if: matrix.compiler == 'icx'
        shell: powershell
        run: |
          Write-Host "Updating winget sources..."
          winget source update --name winget
          Write-Host "Installing Intel oneAPI DPC++/C++ Compiler..."
          winget install --id Intel.oneAPI.DpcppCppCompiler `
            --source winget `
            --accept-source-agreements `
            --accept-package-agreements `
            --silent
          Write-Host "Intel compiler installation completed."

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          REM Locate Visual Studio and set up MSVC environment
          FOR /F "tokens=*" %%i IN ('"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath') DO SET VS_PATH=%%i
          IF NOT DEFINED VS_PATH (
              echo ERROR: Visual Studio not found
              exit /b 1
          )
          CALL "%VS_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          IF ERRORLEVEL 1 (
              echo ERROR: vcvars64.bat failed
              exit /b 1
          )

          REM For Intel compiler, also activate oneAPI environment
          IF "${{ matrix.compiler }}"=="icx" (
              CALL "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" --force
              IF ERRORLEVEL 1 (
                  echo ERROR: Intel oneAPI environment setup failed
                  exit /b 1
              )
              where icx-cl >nul 2>&1 || (echo ERROR: icx-cl not found & exit /b 1)
          ) ELSE (
              where cl >nul 2>&1 || (echo ERROR: cl not found & exit /b 1)
          )

          REM Create build directory and compile
          if not exist "${{ matrix.build_dir }}" mkdir "${{ matrix.build_dir }}"
          cd /d "${{ matrix.build_dir }}"

          IF "${{ matrix.compiler }}"=="clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE%" ^
              /O2 /GS- /arch:AVX2 /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe

          ) ELSE IF "${{ matrix.compiler }}"=="msvc" (
            cl ^
              /I"%OPENCL_INCLUDE%" ^
              /O2 /GS- /arch:AVX2 /W4 /permissive- ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe

          ) ELSE IF "${{ matrix.compiler }}"=="icx" (
            icx-cl ^
              /I"%OPENCL_INCLUDE%" ^
              /O2 /GS- /arch:AVX2 /W4 /permissive- ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      - name: Verify artifact exists
        shell: powershell
        run: |
          if (-not (Test-Path "${{ matrix.artifact_path }}")) {
            Write-Error "Build output not found at ${{ matrix.artifact_path }}"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
