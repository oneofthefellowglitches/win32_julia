name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  release-build:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc, icx]
        include:
          - compiler: clang
            build_dir: build/clang_x64
            artifact_name: win32_julia_clang.exe
          - compiler: msvc
            build_dir: build/msvcl_x64
            artifact_name: win32_julia_msvc.exe
          - compiler: icx
            build_dir: build/intelcx_x64
            artifact_name: win32_julia_icx.exe
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment variables
        shell: powershell
        run: |
          $env:OPENCL_INCLUDE_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\include"
          $env:OPENCL_LIB_PATH_X64 = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\lib\x64"
          $env:MSVCL_BUILD_PATH = "${env:VCToolsInstallDir}"
          $env:LLVM_PATH = "C:\Program Files\LLVM\bin"
          
          echo "OPENCL_INCLUDE_PATH=$env:OPENCL_INCLUDE_PATH" >> $env:GITHUB_ENV
          echo "OPENCL_LIB_PATH_X64=$env:OPENCL_LIB_PATH_X64" >> $env:GITHUB_ENV
          echo "MSVCL_BUILD_PATH=$env:MSVCL_BUILD_PATH" >> $env:GITHUB_ENV
          echo "LLVM_PATH=$env:LLVM_PATH" >> $env:GITHUB_ENV

      - name: Setup Clang
        if: matrix.compiler == 'clang'
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64

      - name: Setup MSVC
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          spectre: true

      - name: Setup Intel C++ Compiler
        if: matrix.compiler == 'icx'
        uses: oneapi-src/setup-oneapi@v2
        with:
          components: |
            intel-oneapi-compiler-dpcpp-cpp
            intel-oneapi-mkl
          cache: true

      - name: Create build directory
        shell: cmd
        run: if not exist ${{ matrix.build_dir }} mkdir ${{ matrix.build_dir }}

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          cd ${{ matrix.build_dir }}
          
          if "${{ matrix.compiler }}" == "clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "msvc" (
            cl ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 /permissive- /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "icx" (
            icx-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c89 ^
              /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      - name: Prepare release artifacts
        shell: powershell
        run: |
          $version = if ("${{ github.event.inputs.version }}") { "${{ github.event.inputs.version }}" } else { "${{ github.ref_name }}" }
          $output = "${{ matrix.artifact_name }}"
          $source = "${{ matrix.build_dir }}/win32_heap_threadctx_503.exe"
          
          if (Test-Path $source) {
            Copy-Item -Path $source -Destination $output
            Write-Host "✓ Prepared artifact: $output"
          } else {
            Write-Error "✗ Build artifact not found at $source"
            exit 1
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    needs: release-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_artifacts/win32_julia_clang.exe/win32_julia_clang.exe
            release_artifacts/win32_julia_msvc.exe/win32_julia_msvc.exe
            release_artifacts/win32_julia_icx.exe/win32_julia_icx.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
