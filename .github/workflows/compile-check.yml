name: Compile Check (PR)

on:
  pull_request:
    paths:
      - '**.c'
      - '**.h'
      - '.github/workflows/**'
      - 'example.env'

jobs:
  compile-check:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Load environment variables
        shell: powershell
        run: |
          # Default OpenCL paths (NVIDIA CUDA)
          $env:OPENCL_INCLUDE_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\include"
          $env:OPENCL_LIB_PATH_X64 = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\lib\x64"
          
          # Export to GitHub environment
          echo "OPENCL_INCLUDE_PATH=$env:OPENCL_INCLUDE_PATH" >> $env:GITHUB_ENV
          echo "OPENCL_LIB_PATH_X64=$env:OPENCL_LIB_PATH_X64" >> $env:GITHUB_ENV

      - name: Syntax Check
        shell: cmd
        run: |
          if not exist build\check mkdir build\check
          cd build\check
          cl /nologo /Zs /I"%OPENCL_INCLUDE_PATH%" /TC ..\..\win32_heap_threadctx_503.c /W4
          if errorlevel 1 (
            echo Syntax check failed!
            exit /b 1
          )

      - name: Check for warnings
        shell: powershell
        run: |
          Write-Host "Compile check passed - No syntax errors detected"
          Write-Host ""
          Write-Host "Code quality checks:"
          Write-Host "  ✓ C syntax validation"
          Write-Host "  ✓ Header files verification"
          Write-Host "  ✓ Include paths resolution"
