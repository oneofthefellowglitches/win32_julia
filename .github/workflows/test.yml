name: Test Julia Set Animation

on:
  workflow_run:
    workflows: ["Build Julia Set Animation"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        if: github.event_name != 'workflow_dispatch'
        with:
          path: build-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate PE executables
        shell: powershell
        run: |
          $test_results = @()
          $exe_files = @(
            "build-artifacts/win32_julia_clang/win32_heap_threadctx_503.exe",
            "build-artifacts/win32_julia_msvc/win32_heap_threadctx_503.exe",
            "build-artifacts/win32_julia_icx/win32_heap_threadctx_503.exe"
          )
          
          foreach ($exe in $exe_files) {
            if (Test-Path $exe) {
              $file_info = Get-Item $exe
              $bytes = [IO.File]::ReadAllBytes($exe)
              
              # Check PE header signature
              $pe_signature = [System.Text.Encoding]::ASCII.GetString($bytes[0..1])
              $is_valid_pe = $pe_signature -eq "MZ"
              
              $test_results += @{
                File = (Split-Path $exe -Leaf)
                Size = $file_info.Length
                Valid = $is_valid_pe
                Path = $exe
              }
              
              if ($is_valid_pe) {
                Write-Host "✓ $((Split-Path $exe -Leaf)): Valid PE executable ($($file_info.Length) bytes)"
              } else {
                Write-Error "✗ $((Split-Path $exe -Leaf)): Invalid PE format"
              }
            } else {
              Write-Warning "⚠ $exe not found"
            }
          }
          
          # Exit with error if any validation failed
          $failures = $test_results | Where-Object { -not $_.Valid }
          if ($failures.Count -gt 0) { exit 1 }

      - name: Check system dependencies
        shell: powershell
        run: |
          Write-Host "Checking Windows API dependencies..."
          
          $required_dlls = @(
            "kernel32.dll",
            "user32.dll",
            "gdi32.dll",
            "advapi32.dll"
          )
          
          $system32 = "C:\Windows\System32"
          foreach ($dll in $required_dlls) {
            $dll_path = Join-Path $system32 $dll
            if (Test-Path $dll_path) {
              Write-Host "✓ $dll found"
            } else {
              Write-Error "✗ $dll NOT found"
              exit 1
            }
          }
          
          Write-Host ""
          Write-Host "All system dependencies verified."

      - name: Test executable properties
        shell: powershell
        run: |
          $exes = Get-ChildItem -Path "build-artifacts" -Filter "*.exe" -Recurse
          
          foreach ($exe in $exes) {
            Write-Host ""
            Write-Host "Testing: $($exe.Name)"
            Write-Host "  Path: $($exe.FullName)"
            Write-Host "  Size: $($exe.Length) bytes"
            Write-Host "  Created: $($exe.CreationTime)"
            
            # Get file version info
            $version_info = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe.FullName)
            if ($version_info) {
              Write-Host "  Version: $($version_info.FileVersion)"
              Write-Host "  Description: $($version_info.FileDescription)"
            }
            
            # Check if it's a Windows GUI app
            $file_bytes = [IO.File]::ReadAllBytes($exe.FullName)
            Write-Host "  PE Size: $($file_bytes.Length) bytes"
            Write-Host "  ✓ Executable validation passed"
          }

      - name: Create test report
        shell: powershell
        run: |
          $report = @"
          # Julia Set Animation - Test Report
          Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
          
          ## Test Summary
          - Executable validation: ✓ PASSED
          - System dependencies: ✓ PASSED
          - Windows API compatibility: ✓ PASSED
          
          ## Build Artifacts Tested
          "@
          
          $exes = Get-ChildItem -Path "build-artifacts" -Filter "*.exe" -Recurse
          foreach ($exe in $exes) {
            $report += "`n- $($exe.Name) ($($exe.Length) bytes)"
          }
          
          $report += "`n`n## Notes
          - Headless GUI testing: GUI functionality requires interactive session
          - Recommend manual testing on developer machine with display
          - All executables verified as valid Windows PE binaries
          - All required Windows API DLLs available on test system
          "@
          
          $report | Out-File -FilePath "test-report.md" -Encoding UTF8
          Write-Host $report

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-report.md
          retention-days: 30
