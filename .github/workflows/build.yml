name: Build win32_julia

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up the MSVC environment for x64 compilation
      - name: Set up Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Runs your included .bat file
      - name: Run build script
        shell: cmd
        run: build.bat

      # Optional: Upload the resulting .exe or artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win32_julia_x64
          path: |
            *.exe
            *.dll
