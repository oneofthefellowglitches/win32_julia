name: Build Julia Set Animation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc, icx]
        include:
          - compiler: clang
            build_dir: build/clang_x64
            artifact_name: win32_julia_clang
            artifact_dir: build/clang_x64/win32_heap_threadctx_503.exe
          - compiler: msvc
            build_dir: build/msvcl_x64
            artifact_name: win32_julia_msvc
            artifact_dir: build/msvcl_x64/win32_heap_threadctx_503.exe
          - compiler: icx
            build_dir: build/intelcx_x64
            artifact_name: win32_julia_icx
            artifact_dir: build/intelcx_x64/win32_heap_threadctx_503.exe
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load environment variables
        shell: powershell
        run: |
          # OpenCL SDK paths (adjust for your installation)
          $env:OPENCL_INCLUDE_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\include"
          $env:OPENCL_LIB_PATH_X64 = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\lib\x64"
          
          # MSVC setup
          $env:MSVCL_BUILD_PATH = "${env:VCToolsInstallDir}"
          
          # LLVM setup (for clang builds)
          $env:LLVM_PATH = "C:\Program Files\LLVM\bin"
          
          # Export to GitHub environment
          echo "OPENCL_INCLUDE_PATH=$env:OPENCL_INCLUDE_PATH" >> $env:GITHUB_ENV
          echo "OPENCL_LIB_PATH_X64=$env:OPENCL_LIB_PATH_X64" >> $env:GITHUB_ENV
          echo "MSVCL_BUILD_PATH=$env:MSVCL_BUILD_PATH" >> $env:GITHUB_ENV
          echo "LLVM_PATH=$env:LLVM_PATH" >> $env:GITHUB_ENV

      - name: Setup Clang
        if: matrix.compiler == 'clang'
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64

      - name: Setup MSVC
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          spectre: true

      - name: Setup Intel C++ Compiler
        if: matrix.compiler == 'icx'
        uses: intel-actions/setup-oneapi@v1
        with:
          components: |
            intel-oneapi-compiler-dpcpp-cpp
            intel-oneapi-mkl
          cache: true

      - name: Create build directory
        shell: cmd
        run: if not exist ${{ matrix.build_dir }} mkdir ${{ matrix.build_dir }}

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          cd ${{ matrix.build_dir }}
          
          if "${{ matrix.compiler }}" == "clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "msvc" (
            cl ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 /permissive- /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "icx" (
            icx-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 ^
              /GS- ^
              /arch:AVX2 ^
              /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c89 ^
              /Tc ^
              ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 ^
              /NODEFAULTLIB ^
              /ENTRY:win32_main_entry ^
              /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      - name: Verify executable
        shell: powershell
        run: |
          $exe_path = "${{ matrix.artifact_dir }}"
          if (Test-Path $exe_path) {
            $file_info = Get-Item $exe_path
            Write-Host "✓ Build successful: $($file_info.Name)"
            Write-Host "  Size: $($file_info.Length) bytes"
            Write-Host "  Created: $($file_info.CreationTime)"
          } else {
            Write-Error "✗ Executable not found at $exe_path"
            exit 1
          }

      - name: Upload build artifact - ${{ matrix.artifact_name }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_dir }}
          retention-days: 30
          compression-level: 9

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ matrix.compiler }}
          path: ${{ matrix.build_dir }}
          retention-days: 7

  build-summary:
    runs-on: ubuntu-latest
    needs: build-matrix
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate build summary
        shell: bash
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-matrix.result }}" == "success" ]; then
            echo "✅ All builds completed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ One or more builds failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          find artifacts -name "*.exe" -o -name "*.log" | while read f; do
            echo "- $(basename $f)" >> $GITHUB_STEP_SUMMARY
          done
