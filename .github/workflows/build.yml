name: Build Julia Set Animation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc]
        include:
          - compiler: clang
            build_dir: build/clang_x64
            artifact_name: win32_julia_clang
            artifact_dir: build/clang_x64/win32_heap_threadctx_503.exe
          - compiler: msvc
            build_dir: build/msvcl_x64
            artifact_name: win32_julia_msvc
            artifact_dir: build/msvcl_x64/win32_heap_threadctx_503.exe
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install OpenCL using vcpkg (a common package manager on Windows)
      - name: Install OpenCL with vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgArguments: 'opencl'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: 'a42af01b84c8c1c3b2f9e1d5a45f2b21845b7c83' # Pin a specific vcpkg version for stability

      # Set environment variables dynamically from vcpkg installation
      - name: Set OpenCL environment variables
        shell: powershell
        run: |
          $vcpkgDir = "${{ github.workspace }}/vcpkg"
          $openclRoot = Get-ChildItem -Path "$vcpkgDir/installed/x64-windows" -Directory | Where-Object { $_.Name -like 'opencl*' } | Select-Object -First 1
          if ($openclRoot) {
            echo "OPENCL_INCLUDE_PATH=$openclRoot/include" >> $env:GITHUB_ENV
            echo "OPENCL_LIB_PATH_X64=$openclRoot/lib" >> $env:GITHUB_ENV
          } else {
            Write-Warning "OpenCL not found, build may lack GPU support"
            # Set fallback paths to avoid immediate error; build will proceed without OpenCL
            echo "OPENCL_INCLUDE_PATH=C:/Nonexistent" >> $env:GITHUB_ENV
            echo "OPENCL_LIB_PATH_X64=C:/Nonexistent" >> $env:GITHUB_ENV
          }

      - name: Setup Clang
        if: matrix.compiler == 'clang'
        # Pin a specific version to avoid unexpected breakages
        uses: egor-tensin/setup-clang@v1
        with:
          version: 18
          platform: x64

      - name: Setup MSVC
        if: matrix.compiler == 'msvc'
        # Use the official Microsoft action or setup directly for better reliability
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # spectre: true # Remove if not strictly needed

      - name: Create build directory
        shell: cmd
        run: |
          if not exist ${{ matrix.build_dir }} mkdir ${{ matrix.build_dir }}

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          cd ${{ matrix.build_dir }}
          if "${{ matrix.compiler }}" == "clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 /GS- /arch:AVX2 /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "msvc" (
            cl ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 /GS- /arch:AVX2 /W4 /permissive- ^
              /Tc ...\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      # The rest of the steps (Verify, Upload artifacts, etc.) can remain the same.
