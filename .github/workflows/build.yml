name: Build Julia Set Animation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc]
        include:
          - compiler: clang
            build_dir: build\clang_x64
            artifact_name: win32_julia_clang
            artifact_path: build\clang_x64\win32_heap_threadctx_503.exe
          - compiler: msvc
            build_dir: build\msvcl_x64
            artifact_name: win32_julia_msvc
            artifact_path: build\msvcl_x64\win32_heap_threadctx_503.exe
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenCL via vcpkg
        shell: powershell
        run: |
          $vcpkgRoot = "$env:RUNNER_TEMP\vcpkg"
          # Only clone if not already cached (speed up future runs)
          if (-not (Test-Path $vcpkgRoot)) {
              git clone -q https://github.com/microsoft/vcpkg.git $vcpkgRoot
          }
          pushd $vcpkgRoot
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg install opencl --triplet x64-windows --clean-after-build
          popd

          $openclRoot = "$vcpkgRoot\installed\x64-windows"
          if (-not (Test-Path "$openclRoot\include\CL\cl.h")) {
              Write-Error "OpenCL headers not found after vcpkg install"
              exit 1
          }
          if (-not (Test-Path "$openclRoot\lib\OpenCL.lib")) {
              Write-Error "OpenCL.lib not found after vcpkg install"
              exit 1
          }
          # Export environment variables for build step
          "OPENCL_INCLUDE=$openclRoot\include" | Out-File -Append -FilePath $env:GITHUB_ENV
          "OPENCL_LIB=$openclRoot\lib"         | Out-File -Append -FilePath $env:GITHUB_ENV
          Write-Host "OpenCL ready: $openclRoot"

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          call "%VS170COMNTOOLS%\..\..\VC\Auxiliary\Build\vcvars64.bat" 2>nul
          if not exist "${{ matrix.build_dir }}" mkdir "${{ matrix.build_dir }}"
          cd /d "${{ matrix.build_dir }}"
          if "${{ matrix.compiler }}"=="clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE%" ^
              /O2 /GS- /arch:AVX2 /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}"=="msvc" (
            cl ^
              /I"%OPENCL_INCLUDE%" ^
              /O2 /GS- /arch:AVX2 /W4 /permissive- ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      - name: Verify artifact exists
        shell: powershell
        run: |
          if (-not (Test-Path "${{ matrix.artifact_path }}")) {
            Write-Error "Build output not found at ${{ matrix.artifact_path }}"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
