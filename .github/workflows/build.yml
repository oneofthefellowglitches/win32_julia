name: Build Julia Set Animation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: windows-latest
    strategy:
      matrix:
        compiler: [clang, msvc]
        include:
          - compiler: clang
            build_dir: build/clang_x64
            artifact_name: win32_julia_clang
            artifact_dir: build/clang_x64/win32_heap_threadctx_503.exe
          - compiler: msvc
            build_dir: build/msvcl_x64
            artifact_name: win32_julia_msvc
            artifact_dir: build/msvcl_x64/win32_heap_threadctx_503.exe
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup MSVC environment (sets Windows SDK variables for both compilers)
      - name: Setup MSVC (for SDK paths)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Set OpenCL paths using the Windows SDK (headers + ICD loader library)
      - name: Set OpenCL environment variables
        shell: powershell
        run: |
          # Windows SDK includes OpenCL headers and the ICD loader library
          $sdkDir = $env:WindowsSdkDir
          $sdkVer = $env:WindowsSDKVersion -replace '\\$'   # remove trailing backslash if present
          $oclInclude = Join-Path $sdkDir "Include" $sdkVer "shared"
          $oclLib     = Join-Path $sdkDir "Lib"     $sdkVer "um\x64"
          echo "OPENCL_INCLUDE_PATH=$oclInclude" >> $env:GITHUB_ENV
          echo "OPENCL_LIB_PATH_X64=$oclLib"     >> $env:GITHUB_ENV

      - name: Setup Clang
        if: matrix.compiler == 'clang'
        uses: egor-tensin/setup-clang@v1
        with:
          version: 18
          platform: x64

      - name: Create build directory
        shell: cmd
        run: |
          if not exist ${{ matrix.build_dir }} mkdir ${{ matrix.build_dir }}

      - name: Build with ${{ matrix.compiler }}
        shell: cmd
        run: |
          cd ${{ matrix.build_dir }}
          if "${{ matrix.compiler }}" == "clang" (
            clang-cl -target x86_64-pc-windows-msvc ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 /GS- /arch:AVX2 /W4 ^
              -Xclang -fno-builtin-memcpy ^
              -Xclang -fno-builtin-memset ^
              -Xclang -std=c99 ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          ) else if "${{ matrix.compiler }}" == "msvc" (
            cl ^
              /I"%OPENCL_INCLUDE_PATH%" ^
              /O2 /GS- /arch:AVX2 /W4 /permissive- ^
              /Tc ..\..\win32_heap_threadctx_503.c ^
              /link ^
              /LIBPATH:"%OPENCL_LIB_PATH_X64%" ^
              OpenCL.lib kernel32.lib user32.lib gdi32.lib ^
              /MACHINE:X64 /NODEFAULTLIB ^
              /ENTRY:win32_main_entry /SUBSYSTEM:WINDOWS ^
              /OUT:win32_heap_threadctx_503.exe
          )

      - name: Verify executable
        shell: cmd
        run: dir ${{ matrix.build_dir }}\*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_dir }}
